<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>

    <title>Login | Guess My College</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'spin-slow': 'spin 15s linear infinite',
                        'spin-reverse': 'spin-reverse 15s linear infinite',

                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
        @keyframes hue-shift { 0% { filter: hue-rotate(0deg); } 50% { filter: hue-rotate(90deg); } 100% { filter: hue-rotate(0deg); } }

    </style>
</head>
<body class="bg-[#f0f4f8] dark:bg-[#050508] min-h-[100dvh] flex items-center justify-center p-4 overflow-hidden font-sans">

    <div class="fixed inset-0 z-0 pointer-events-none gemini-bg">

        <div class="absolute bottom-[-10%] right-[-20%] w-[70vw] h-[70vw] rounded-full blur-[120px] opacity-40 dark:opacity-30 mix-blend-multiply dark:mix-blend-screen bg-gradient-to-tr from-blue-600 to-cyan-400 animate-spin-reverse"></div>

        <button class="w-full flex items-center justify-center gap-3 bg-white dark:bg-[#0a0a12] text-black dark:text-white font-black text-lg py-4 px-6 rounded-2xl shadow-lg border border-black/10 dark:border-white/10 hover:-translate-y-1 hover:shadow-xl transition-all active:scale-95 group">
            <svg class="w-6 h-6" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google

        <p class="mt-8 text-xs font-medium text-gray-500 dark:text-gray-400">
            By continuing, you agree to our <br><a href="#" class="text-purple-600 dark:text-purple-400 hover:underline">Terms of Service</a> and <a href="#" class="text-purple-600 dark:text-purple-400 hover:underline">Privacy Policy</a>.
        </p>
    </div>

</body>
</html>
