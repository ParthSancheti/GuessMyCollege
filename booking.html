<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>
    <script>
        const _t = localStorage.getItem('gmc-theme') || 'dark';
        if (_t === 'light') document.documentElement.classList.remove('dark');
        else document.documentElement.classList.add('dark');
    </script>
    <script src="global.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book 1:1 Session | Guess My College</title>
    <link rel="icon" href="bin/logo_rounded.png" type="image/png">
    
    <link href="bin/output.css?v=1.0" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
    
    <script>
        // GLOBAL THEME SYNC LOGIC
        const savedTheme = localStorage.getItem('gmc-theme') || 'dark';
        if (savedTheme === 'light') { document.documentElement.classList.remove('dark'); } 
        else { document.documentElement.classList.add('dark'); }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'spin-slow': 'spin 15s linear infinite',
                        'spin-reverse': 'spin-reverse 15s linear infinite',
                        'draw-check': 'drawcheck 0.8s forwards',
                        'pop-in': 'popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards'
                    },
                    keyframes: {
                        drawcheck: {
                            '0%': { strokeDashoffset: '100', strokeDasharray: '100' },
                            '100%': { strokeDashoffset: '0', strokeDasharray: '100' }
                        },
                        popIn: {
                            '0%': { opacity: '0', transform: 'scale(0.8) translateY(20px)' },
                            '100%': { opacity: '1', transform: 'scale(1) translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
        body { transition: background-color 0.1s ease, color 0.1s ease; }
        /* Force the body background to be dynamic */
        body {
            background-color: #f0f4f8; /* Light Mode Background */
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .dark body {
            background-color: #050508; /* Dark Mode Background */
        }
        /* Gemini Multi-Color Background */
        @keyframes hue-shift { 0% { filter: hue-rotate(0deg); } 50% { filter: hue-rotate(90deg); } 100% { filter: hue-rotate(0deg); } }
        .gemini-bg { animation: hue-shift 20s infinite ease-in-out; }

        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* Premium Glass Inputs */
        .glass-input {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #000;
        }
        .dark .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .glass-input:focus {
            outline: none; border-color: #a855f7; box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }
        
        /* ULTRA-PREMIUM MODAL ANIMATION */
        @keyframes glass-pop {
            0% { opacity: 0; transform: scale(0.85) translateY(30px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }
        .animate-glass-pop { 
            animation: glass-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; 
        }

        /* Custom Dropdown Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.3); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(168, 85, 247, 0.7); }

        .glass-swal {
            background: rgba(18, 18, 26, 0.85) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 2rem !important;
            color: #ffffff !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;
        }
        html:not(.dark) .glass-swal {
            background: rgba(255, 255, 255, 0.85) !important;
            color: #000000 !important;
            border: 1px solid rgba(0, 0, 0, 0.1) !important;
        }
        .glass-swal-confirm { background: #a855f7 !important; border-radius: 1rem !important; font-weight: 800 !important; padding: 12px 30px !important; }
        .check-svg { stroke-dasharray: 100; stroke-dashoffset: 100; }
    </style>
</head>

                <div class="w-8 h-8 rounded-full bg-black/5 dark:bg-white/10 flex items-center justify-center">

        <div class="rounded-[3rem] p-6 md:p-8 shadow-2xl backdrop-blur-3xl bg-white/60 border border-black/10 dark:bg-[#12121a]/80 dark:border-white/10 flex flex-col lg:flex-row gap-8 lg:gap-12 w-full">
            
            <div class="hidden lg:block lg:w-5/12 relative">
                <div class="sticky top-8 h-[calc(100vh-6rem)] max-h-[800px] rounded-[2.5rem] overflow-hidden border border-black/10 dark:border-white/10 shadow-2xl group cursor-pointer">
                    <img src="bin/bokkingimg.png" class="absolute inset-0 w-full h-full object-cover opacity-90 dark:opacity-70 mix-blend-multiply dark:mix-blend-normal transition-transform duration-700 ease-out group-hover:scale-110">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent flex flex-col justify-end p-10 transition-colors duration-500 group-hover:from-black/95">
                        <span class="bg-purple-600 text-white px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-widest mb-4 inline-block self-start shadow-lg transform transition-transform duration-500 group-hover:-translate-y-1">MHT-CET 2026</span>
                        <h2 class="text-4xl xl:text-5xl font-black text-white leading-[1.1] mb-2 drop-shadow-lg transform transition-transform duration-500 group-hover:translate-x-2">Expert 1:1<br>Guidance.</h2>

                            <input type="tel" name="phone_number" required maxlength="15" placeholder="+91" oninput="this.value = this.value.replace(/[^0-9+]/g, '')" class="w-full rounded-2xl px-4 py-3 md:px-5 md:py-4 glass-input font-medium text-base md:text-lg transition-all focus:scale-[1.02] hover:shadow-[0_5px_15px_rgba(0,0,0,0.05)] dark:hover:shadow-[0_5px_15px_rgba(255,255,255,0.05)]">
                        </div>
                        <div class="flex-1">

                            <input type="email" name="email" required maxlength="100" placeholder="student@example.com" class="w-full rounded-2xl px-4 py-3 md:px-5 md:py-4 glass-input font-medium text-base md:text-lg transition-all focus:scale-[1.02] hover:shadow-[0_5px_15px_rgba(0,0,0,0.05)] dark:hover:shadow-[0_5px_15px_rgba(255,255,255,0.05)]">

                            <input type="number" name="rank" placeholder="Rank" oninput="this.value = this.value.replace(/[^0-9]/g, ''); if(this.value !== '' && parseInt(this.value) === 0) this.value = 1;" class="w-full rounded-2xl px-4 py-3 md:px-5 md:py-4 glass-input font-medium text-base md:text-lg transition-all focus:scale-[1.02] hover:shadow-[0_5px_15px_rgba(0,0,0,0.05)] dark:hover:shadow-[0_5px_15px_rgba(255,255,255,0.05)]">
                        </div>

                            <label class="block text-xs md:text-sm font-bold mb-2 tracking-wide text-gray-700 dark:text-gray-300">%tile <span class="text-gray-400 font-medium text-[10px] ml-1">(Optional)</span></label>
                            <input type="text" name="percentile" placeholder="%tile" oninput="this.value = this.value.replace(/[^0-9.]/g, '').replace(/(\..*?)\..*/g, '$1'); if(this.value !== '' && parseFloat(this.value) > 100) this.value = 100;" class="w-full rounded-2xl px-4 py-3 md:px-5 md:py-4 glass-input font-medium text-base md:text-lg transition-all focus:scale-[1.02] hover:shadow-[0_5px_15px_rgba(0,0,0,0.05)] dark:hover:shadow-[0_5px_15px_rgba(255,255,255,0.05)]">
                        </div>
                    </div>

                    <div class="pt-6">
                        <button type="submit" id="proceedBtn" class="w-full bg-black text-white dark:bg-white dark:text-black font-black text-lg md:text-xl py-4 px-6 md:py-5 md:px-8 rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.3)] dark:shadow-[0_10px_30px_rgba(255,255,255,0.2)] hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center group">
                            Proceed to Payment (₹899) <svg class="w-5 h-5 md:w-6 md:h-6 ml-2 md:ml-3 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>

    <div id="loadingModal" class="fixed inset-0 z-[9999] bg-[#050508]/70 backdrop-blur-[40px] hidden flex-col items-center justify-center p-4 transition-all duration-300">
        <div class="flex flex-col items-center justify-center animate-glass-pop pt-24 pb-2">
            <img src="bin/sub_loader.gif" alt="Processing..." class="w-56 md:w-72 object-contain drop-shadow-[0_0_50px_rgba(168,85,247,0.6)]" onerror="this.outerHTML='<div class=\'animate-spin rounded-full h-32 w-32 border-b-4 border-purple-500\'></div>'">
        </div>
    </div>

    <div id="successModal" class="fixed inset-0 z-[9999] bg-[#050508]/90 backdrop-blur-2xl hidden flex-col items-center justify-center px-4 opacity-0 transition-opacity duration-500">
        <div class="bg-white/10 dark:bg-[#12121a]/60 rounded-[3rem] p-10 md:p-14 flex flex-col items-center justify-center text-center max-w-md w-full border border-white/20 shadow-[0_0_60px_rgba(34,197,94,0.2)] backdrop-blur-3xl relative overflow-hidden animate-pop-in max-h-[85vh] overflow-y-auto">
            <div class="absolute inset-0 bg-gradient-to-b from-green-500/10 to-transparent pointer-events-none"></div>
            
            <svg viewBox="0 0 52 52" class="w-36 h-36 mb-6 stroke-green-500 stroke-[4px] fill-none relative z-10" style="stroke-linecap: round; stroke-linejoin: round;">
                <circle cx="26" cy="26" r="24" class="stroke-green-500/20" />
                <path d="M14 27l7 7 16-16" class="check-svg animate-draw-check" />
            </svg>
            
            <h2 class="text-4xl font-black mb-3 text-white tracking-tight relative z-10">Confirmed!</h2>
            <p class="text-gray-300 font-medium text-lg mb-8 leading-relaxed relative z-10">Your session is booked.<br>Check your email for details.</p>
            
            <a href="index.html" class="w-full flex justify-center items-center bg-white text-black font-black text-lg py-4 rounded-2xl transition-transform hover:scale-105 active:scale-95 shadow-[0_10px_20px_rgba(255,255,255,0.1)] relative z-10">
                Back to Dashboard
            </a>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyuJAksfYJOKhnB21kNdJ_sujndnyX8H7CH6iPkcgiNTJmqvtrdGp5zC54DQzWpaKn6BA/exec';
        // --- 2. CUSTOM GLASS DROPDOWN LOGIC ---
        function setupCustomDropdowns() {
            document.querySelectorAll('.custom-select-wrapper').forEach(wrapper => {
                const trigger = wrapper.querySelector('.dropdown-trigger');
                const menu = wrapper.querySelector('.dropdown-menu');
                const hiddenInput = wrapper.querySelector('input[type="hidden"]');
                const selectedText = wrapper.querySelector('.selected-text');
                const options = wrapper.querySelectorAll('.dropdown-menu div[data-value]');
                const chevron = wrapper.querySelector('svg');

                trigger.addEventListener('click', (e) => {
                    document.querySelectorAll('.dropdown-menu').forEach(m => {
                        if (m !== menu) closeMenu(m, m.parentElement.querySelector('svg'));
                    });
                    if (menu.classList.contains('hidden')) openMenu(menu, chevron);
                    else closeMenu(menu, chevron);
                    e.stopPropagation();
                });

                options.forEach(opt => {
                    opt.addEventListener('click', () => {
                        const val = opt.getAttribute('data-value');
                        hiddenInput.value = val;
                        selectedText.innerText = opt.innerText;
                        selectedText.classList.remove('text-gray-500', 'dark:text-gray-400');
                        selectedText.classList.add('text-black', 'dark:text-white');
                        
                        closeMenu(menu, chevron);
                        
                        if (hiddenInput.id === 'sync-category') localStorage.setItem('gmc-category', val);
                        if (hiddenInput.id === 'sync-branch') localStorage.setItem('gmc-branch', val);
                    });
                });
            });

            document.addEventListener('click', () => {
                document.querySelectorAll('.dropdown-menu').forEach(menu => {
                    closeMenu(menu, menu.parentElement.querySelector('svg'));
                });
            });
        }

        function openMenu(menu, chevron) {
            menu.classList.remove('hidden');
            setTimeout(() => {
                menu.classList.remove('opacity-0', 'translate-y-[-10px]');
                menu.classList.add('opacity-100', 'translate-y-0');
                if(chevron) chevron.classList.add('rotate-180');
            }, 10);
        }

        function closeMenu(menu, chevron) {
            menu.classList.remove('opacity-100', 'translate-y-0');
            menu.classList.add('opacity-0', 'translate-y-[-10px]');
            if(chevron) chevron.classList.remove('rotate-180');
            setTimeout(() => menu.classList.add('hidden'), 300); 
        }

        // --- 3. AUTO-SYNC LOGIC ---
        window.addEventListener('DOMContentLoaded', () => {
            setupCustomDropdowns(); 

            const savedMarks = localStorage.getItem('gmc-marks');
            const savedCategory = localStorage.getItem('gmc-category');
            const savedBranch = localStorage.getItem('gmc-branch');
            
            if (savedMarks) document.getElementById('sync-marks').value = savedMarks;
            
            if (savedCategory) {
                const opt = document.querySelector(`#category-wrapper div[data-value="${savedCategory}"]`);
                if (opt) opt.click();
            }
            if (savedBranch) {
                const opt = document.querySelector(`#branch-wrapper div[data-value="${savedBranch}"]`);
                if (opt) opt.click();
            }
        });

        // --- 4. DOM ELEMENTS & AUDIO ---
        const form = document.getElementById('bookingForm');
        const loadingModal = document.getElementById('loadingModal');
        const successModal = document.getElementById('successModal');
        // Swapped to MP3 for better cross-browser support
        const successSound = new Audio('https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3');

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); 

            // THE AUDIO FIX: Silently "unlock" the audio on the initial click
            successSound.muted = true;
            successSound.play().then(() => {
                successSound.pause();
                successSound.muted = false;
                successSound.currentTime = 0;
            }).catch(e => console.log("Audio unlock pending:", e));

            // --- LOGICAL RESTRICTIONS (Marks and Percentile) ---
            const marks = parseFloat(form.marks.value);
            const percentile = parseFloat(form.percentile.value);

            if (marks < 0 || marks > 200) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Wait a second!',
                    text: 'MHT-CET marks must be between 0 and 200.',
                    customClass: { popup: 'glass-swal', confirmButton: 'glass-swal-confirm' }
                });
                return;
            }

            if (form.percentile.value && (percentile < 0 || percentile > 100)) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Wait a second!',
                    text: 'Percentile must be between 0 and 100.',
                    customClass: { popup: 'glass-swal', confirmButton: 'glass-swal-confirm' }
                });
                return;
            }
            // ---------------------------------------------------

            // Custom validation for hidden inputs (Custom Dropdowns)
            if(!form.category.value || !form.branch.value) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Required Fields',
                    text: 'Please select both your Category and Preferred Branch.',
                    customClass: { popup: 'glass-swal', confirmButton: 'glass-swal-confirm' }
                });
                return;
            }

            loadingModal.classList.remove('hidden');

            try {
                const response = await fetch('https://parthsancheti.pythonanywhere.com/create-payment-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: form.email.value })
                });
                
                if (!response.ok) throw new Error("Python Server Offline");
                const data = await response.json();

                loadingModal.classList.add('hidden');

                // 1. Initialize Cashfree and open the modal pop-up
                const cashfree = Cashfree({ mode: "production" }); // CHANGE TO "" WHEN LIVE

                const checkoutOptions = {
                    paymentSessionId: data.payment_session_id,
                    redirectTarget: "_modal"
                };

                cashfree.checkout(checkoutOptions).then(async (result) => {
                    if (result.error) {
                        loadingModal.classList.add('hidden');
                        Swal.fire({
                            icon: 'error', title: 'Payment Failed',
                            text: result.error.message || "Transaction cancelled.",
                            customClass: { popup: 'glass-swal', confirmButton: 'glass-swal-confirm' }
                        });
                        return;
                    }

                    if (result.paymentDetails) {
                        // 2. Payment succeeded → verify with the backend, then sync the booking
                        loadingModal.classList.remove('hidden');
                        try {
                            const verifyRes = await (await fetch('https://parthsancheti.pythonanywhere.com/verify-booking-payment', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    order_id: data.order_id,
                                    email: form.email.value
                                })
                            })).json();

                            if (verifyRes.result !== 'success') {
                                throw new Error(verifyRes.error || "Verification failed");
                            }

                            // 3. Verified → push the booking details to the Google Sheet
                            const fd = new FormData(form);
                            fd.append('order_id', data.order_id);
                            fd.append('payment_status', 'SUCCESS');

                            const sheetData = await (await fetch(SCRIPT_URL, { method: 'POST', body: fd })).json();
                            loadingModal.classList.add('hidden');

                            if (sheetData.result === 'success') {
                                successSound.play().catch(e => console.log("Audio blocked by browser:", e));
                                form.reset();
                                successModal.classList.remove('hidden');
                                successModal.style.display = 'flex';
                                setTimeout(() => successModal.classList.remove('opacity-0'), 10);
                            } else {
                                throw new Error(sheetData.error || "Sheet sync failed");
                            }
                        } catch (e) {
                            loadingModal.classList.add('hidden');
                            Swal.fire({
                                icon: 'error', title: 'Verification Error',
                                text: 'Payment succeeded, but we could not confirm the booking. Keep this Order ID safe: ' + data.order_id,
                                customClass: { popup: 'glass-swal', confirmButton: 'glass-swal-confirm' }
                            });
                        }
                    }
                });

            } catch (error) {
                loadingModal.classList.add('hidden');
                console.error("Gateway Error:", error);
                Swal.fire({
                    icon: 'error',
                    title: 'Server Offline',
                    text: 'Could not connect to payment server. Ensure your Python backend is running!',
                    customClass: { popup: 'glass-swal', confirmButton: 'glass-swal-confirm' }
                });
            }
        });
    </script>
</body>
</html>
